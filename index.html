<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Миний Танилцуулга</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .profile-card { margin-top: 50px; text-align: center; padding: 20px; width: 85%; max-width: 400px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); margin-bottom: 15px; object-fit: cover; }
        
        h1 { margin: 10px 0; font-size: 1.8rem; }
        p { color: #94a3b8; line-height: 1.6; }
        
        .social-links { margin: 20px 0; display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 10px 20px; background: var(--primary); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; transition: 0.3s; cursor: pointer; border: none; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }

        .skills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 20px; }
        .skill-tag { background: #1e293b; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://www.facebook.com/share/1E9JqM8bXG/" alt="Профайл зураг" class="avatar">
        
        <h1>Ундармаа</h1> <p>Эмч | Технологи сонирхогч | Бүтээлч нэгэн</p>
        
        <div class="skills">
            <span class="skill-tag">Эрүүл мэнд</span>
            <span class="skill-tag">Вэб хөгжүүлэлт</span>
            <span class="skill-tag">Гэрэл зураг</span>
        </div>

        <div class="social-links">
            <button class="btn" onclick="changeColor()">Өнгө солих</button>
        </div>
        
        <p style="font-size: 0.9rem;">"Өнөөдөр сурсан зүйл маргаашийн амжилтын үндэс."</p>
    </div>

    <script>
        function changeColor() {
            const colors = ['#6366f1', '#ec4899', '#10b981', '#f59e0b', '#ef4444'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.documentElement.style.setProperty('--primary', randomColor);
        }
    </script>

</body>
</html>
