<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ундармаа | Миний танилцуулга</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
transition:0.5s;
}

.container{
text-align:center;
}

.card{
background:#1e293b;
padding:35px;
border-radius:20px;
width:340px;
box-shadow:0 15px 35px rgba(0,0,0,0.5);
animation:fadeIn 1.5s ease;
}

.profile{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid orange;
margin-bottom:15px;
}

h1{
margin-bottom:8px;
}

.role{
color:#cbd5e1;
margin-bottom:15px;
}

.tags span{
display:inline-block;
background:#334155;
padding:7px 14px;
border-radius:20px;
margin:5px;
font-size:13px;
}

button{
background:orange;
border:none;
padding:10px 20px;
border-radius:10px;
margin-top:18px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.quote{
margin-top:20px;
font-style:italic;
color:#cbd5f5;
}

.social{
margin-top:20px;
}

.social a{
text-decoration:none;
color:white;
margin:0 8px;
font-size:14px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<img class="profile" src="profile.jpg">

<h1>Ундармаа</h1>

<p class="role">Эмч | Технологи сонирхогч | Бүтээлч нэгэн</p>

<div class="tags">
<span>Эрүүл мэнд</span>
<span>Вэб хөгжүүлэлт</span>
<span>Гэрэл зураг</span>
</div>

<button onclick="changeColor()">Өнгө солих</button>

<p class="quote">
"Өнөөдөр сурсан зүйл маргаашийн амжилтын үндэс."
</p>

<div class="social">
<a href="instagram://user/?username=undra.ivy&igsh=bGtmdHp4Ym1iZGhn&utm_source=qr">Instagram</a>
<a href="mailto:gms17d076@st.mnums.edu.mn">Email</a>
<a href="https://www.facebook.com/share/1DwYTNwGSm/">facebook</a>
</div>

</div>

</div>

<script>

function changeColor(){

let colors=[
"linear-gradient(135deg,#0f172a,#1e293b)",
"linear-gradient(135deg,#1e3a8a,#1e40af)",
"linear-gradient(135deg,#312e81,#4338ca)",
"linear-gradient(135deg,#134e4a,#0f766e)"
]

let random=Math.floor(Math.random()*colors.length)

document.body.style.background=colors[random]

}

</script>

</body>
</html>
